<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quiz Scoreboard</title>
  <style>
    body {
      background: linear-gradient(to bottom, #111, #333);
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      padding: 2rem;
      text-align: center;
    }
    h1 {
      margin-bottom: 1rem;
      color: #00ffc3;
    }
    table {
      margin: auto;
      width: 90%;
      border-collapse: collapse;
      background: #1e1e1e;
      border: 1px solid #555;
      box-shadow: 0 0 10px rgba(0,255,255,0.3);
    }
    th, td {
      padding: 1rem;
      border-bottom: 1px solid #444;
    }
    th {
      background-color: #222;
      color: #00ffc3;
    }
    tr:hover {
      background-color: #333;
    }
    .btn-home {
      margin-top: 2rem;
      padding: 12px 25px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      background: #ffd700;
      color: black;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.2s ease;
    }
    .btn-home:hover {
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <h1>📊 Quiz Scoreboard</h1>
  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Score</th>
      </tr>
    </thead>
    <tbody id="scoreboardBody">
      <tr><td colspan="2">Loading...</td></tr>
    </tbody>
  </table>

  <div>
    <button class="btn-home" onclick="goHome()">🏠 Home</button>
  </div>

  <script>
    fetch("https://quiz-backend.onrender.com/scores")
      .then(res => res.json())
      .then(data => {
        const tbody = document.getElementById("scoreboardBody");
        tbody.innerHTML = "";

        if (data.length === 0) {
          tbody.innerHTML = "<tr><td colspan='2'>No scores yet.</td></tr>";
        } else {
          data.forEach(entry => {
            const row = document.createElement("tr");
            row.innerHTML = `
              <td>${entry.name}</td>
              <td>${entry.score}</td>
            `;
            tbody.appendChild(row);
          });
        }
      })
      .catch(err => {
        console.error("Failed to load scores:", err);
        document.getElementById("scoreboardBody").innerHTML = "<tr><td colspan='2'>Error loading scores.</td></tr>";
      });

    function goHome() {
      window.location.href = "index.html";
    }
  </script>
</body>
</html>
